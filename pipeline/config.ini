# CIB Forecast — environnement Attijari (cib_project_attijari) : HDFS + Hive + Spark + Airflow
#
# Tout le pipeline lit/écrit via le metastore Hive (tables ORC sur HDFS).
# `local_base` : artefacts ML + exports policy notebook (policy_v6_final_*pct.csv).

[cib]
format = hive
hive_format = orc

# Schémas Hive : bronze (brut), silver (agrégé + policy), ml (features + scoring)
schema_bronze = cib_bronze
schema_silver = cib_silver
schema_ml     = cib_ml

# HDFS — aligné avec hive/*.hql LOCATION (environnement cib_project_attijari)
hdfs_base   = hdfs://127.0.0.1:9000/data/cib
hive_warehouse = hdfs://127.0.0.1:9000/user/hive/warehouse

# Artefacts hors Hive (modèles, exports policy, métriques d'entraînement)
local_base  = /home/jihane/cib_project/cib_forecast_data

# Tables bronze
table_bronze_transactions = transactions_raw
table_bronze_calendar     = calendar_weekly_flags
# Macro : synthetic (ingest) | scraped (job scrape_macro) | hybrid (scrape puis complète ingest)
macro_source = scraped
macro_n_weeks = 104
macro_yahoo_range = 5y
macro_scrape_cache_dir = bronze/raw/macro_cache
# format: indicator:symbol|fallback1;fallback2
macro_yahoo_symbols = oil_price_z:BZ=F,commodity_index_z:DBC,masi_index_z:MASI.CS|^GSPC,realestate_index_z:IYR
table_bronze_macro        = macro_indicators_weekly
table_bronze_sector_macro = sector_macro_mapping

# Référence locale (mapping secteur → macro, PFE synthétique)
reference_sector_macro_csv = /home/jihane/cib_project/cib_forecast/data/reference/sector_macro_mapping.csv

# Tables silver / policy / features / scoring
# Clés centralisées : renommer une table = une seule ligne ici, pas dans tout le code.
table_silver_weekly  = weekly_cashflow_account
table_silver_metrics = account_quality_metrics
table_silver_macro_assignment = account_macro_assignment
table_policy         = account_policy
table_features       = features_cib_forecast
table_predictions    = predictions_cib_forecast

# Modèles ML (URI logique ; fichiers joblib sous local_base ou /tmp)
hdfs_models_regression     = hdfs://127.0.0.1:9000/data/cib/models/regression
hdfs_models_classification = hdfs://127.0.0.1:9000/data/cib/models/classification

# Filtre qualité (Step 7) — profil « moderate » (Exp 7, acf1_min=0.20)
quality_min_obs          = 24
quality_acf_lag1_min     = 0.20
quality_adf_pvalue_max   = 0.10
quality_completeness_min = 0.60
quality_transactions_min = 100
quality_cv_min           = 0.20
quality_cv_max           = 2.00
quality_predictability_min = 35
quality_composite_min    = 40

# Machine learning
ml_n_lags     = 4
ml_test_size  = 4
ml_n_splits   = 3

# Policy : category_v7 (encapsulé EXP) | category_v6 (legacy) | rules (R0--R4)
policy_mode = category_v7
policy_lift_threshold_pct = 3.0
policy_v7_csv =
policy_v6_csv =
policy_external_noise_frac = 0
policy_exports_dir = /home/jihane/cib_project/cib_project_outputs/cib_experiment_outputs
policy_sector_cv_lookup =
policy_account_overrides =
